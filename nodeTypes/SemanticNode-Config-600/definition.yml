fileVersion: 1
id: "600"
isDisabled: true
metadata:
  defaultStorageLocation: null
  error: null
  nodeMetadataSpec: |-
    capitalized: Semantic_View_Builder
    short: SVB
    tagColor: gold
    plural: Semantic_View_Builders

    config:
    - groupName: Config
      items:
      - type: textBox
        displayName: RELATIONSHIPS
        attributeName: RELATIONSHIPS
        isRequired: false
        default: "FCT_ORDERS (o_custkey) REFERENCES DIM_CUSTOMER"
        enableIf: "false"
        syntax: sql
        options:
        - view

      - type: tabular
        displayName: 'FACTS'
        attributeName: TABLE_FACTS
        isRequired: FALSE
        columns:

        - displayName: Name
          type: textBox
          attributeName: FACTS_NAME

      - type: dropdownSelector
        displayName: Text Functions
        attributeName: FACTS_FUNCTION_NAME
        isRequired: false
        default: NONE
        options:
        - NONE
        - LEFT
        - RIGHT
        - CONCAT
        - SPLIT

      - displayName: Column Base
        type: columnDropdownSelector
        attributeName: FACTS_COLUMN_BASE

      - displayName: Argument
        type: textBox
        attributeName: FACTS_ARGUMENT

      - type: tabular
        displayName: 'DIMENSIONS'
        attributeName: TABLE_DIMENSIONS
        isRequired: FALSE
        columns:

        - displayName: Name
          type: textBox
          attributeName: DIMENSION_NAME

      - type: dropdownSelector
        displayName: Text Functions
        attributeName: DIMENSION_FUNCTION_NAME
        isRequired: false
        default: NONE
        options:
        - NONE
        - LEFT
        - RIGHT
        - CONCAT
        - SPLIT

      - displayName: Column Base
        type: columnDropdownSelector
        attributeName: DIMENSION_COLUMN_BASE

      - displayName: Argument
        type: textBox
        attributeName: DIMENSION_ARGUMENT

      - type: tabular
        displayName: 'METRICS'
        attributeName: TABLE_METRICS
        isRequired: FALSE
        columns:

        - displayName: Name
          type: textBox
          attributeName: METRIC_NAME

      - type: dropdownSelector
        displayName: Aggregate Functions
        attributeName: METRIC_FUNCTION_NAME
        isRequired: false
        default: SUM
        options:
        - AVG
        - MAX
        - MIN
        - COUNT
        - SUM

      - displayName: Column Base
        type: columnDropdownSelector
        attributeName: METRIC_COLUMN_BASE

    mappingColumns:

    - headerName: RELATIONSHIP
      attributeName: DEFINE_RELATIONSHIP
      type: textBox
name: Semantic Node - Config
type: NodeType
